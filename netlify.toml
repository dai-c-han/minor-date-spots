[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"

# /api/* → Netlify Function にリダイレクト
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# SPA フォールバック
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
